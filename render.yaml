services:
  - type: web
    name: laptopshop
    runtime: docker
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8080
      - key: JPA_DDL_AUTO
        value: validate
      - key: SPRING_SESSION_JDBC_INITIALIZE_SCHEMA
        value: never
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
