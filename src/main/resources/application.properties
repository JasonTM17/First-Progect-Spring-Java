spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.open-in-view=false

#config view engine
# spring.mvc.view.prefix=/WEB-INF/view/
# spring.mvc.view.suffix=.jsp

#default = 1MB
spring.servlet.multipart.max-file-size=50MB

#default = 10 MB (form data)
spring.servlet.multipart.max-request-size=50MB

logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL:INFO}

management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true
info.app.name=Laptopshop
info.app.description=Spring Boot MVC e-commerce portfolio application
info.app.version=${APP_VERSION:0.0.1-SNAPSHOT}
app.base-url=${APP_BASE_URL:}

#config session
spring.session.store-type=${SPRING_SESSION_STORE_TYPE:jdbc}
spring.session.timeout=${SPRING_SESSION_TIMEOUT:30m}
spring.session.jdbc.initialize-schema=${SPRING_SESSION_JDBC_INITIALIZE_SCHEMA:always}
